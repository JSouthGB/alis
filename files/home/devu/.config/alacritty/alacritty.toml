import = ["/home/devu/.config/alacritty/themes/themes/github_dark_high_contrast.toml"]

[window]
padding.x = 2
padding.y = 0
opacity = 1

[scrolling]
history = 10000
multiplier = 3

# [colors]
# draw_bold_text_with_bright_colors = true

[font]
size = 12
[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"
[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"
[font.italic]
family = "FiraCode Nerd Font"
style = "Italic"
[font.bold_italic]
family = "FiraCode Nerd Font"
style = "Bold Italic"

[selection]
save_to_clipboard = true